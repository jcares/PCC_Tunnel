services:
  gateway:
    build:
      context: ./gateway
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      PCC_CONTROL_ADDR: ":8080"
      PCC_PUBLIC_ADDR: ":8081"
      PCC_AUTH_TOKEN: "${PCC_AUTH_TOKEN:?PCC_AUTH_TOKEN must be set}"
      PCC_LOG_FILE: "/app/logs/gateway.log"
    restart: always
    volumes:
      - gateway-logs:/app/logs
    healthcheck:
      test: ["CMD", "sh", "-c", "echo > /dev/tcp/localhost/8080"]
      interval: 10s
      timeout: 5s
      retries: 3

  client:
    build:
      context: ./client
    environment:
      PCC_GATEWAY_ADDR: "gateway:8080"
    restart: always
    depends_on:
      gateway:
        condition: service_healthy
    volumes:
      - client-logs:/app/logs

volumes:
  gateway-logs:
  client-logs:
