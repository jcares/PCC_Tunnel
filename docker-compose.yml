services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PCC_SERVER_URL: ${PCC_SERVER_URL:-https://tudominio.example/api}
      PCC_AUTH_TOKEN: ${PCC_AUTH_TOKEN:-}
      PCC_REGISTRATION_KEY: ${PCC_REGISTRATION_KEY:-}
      PCC_PROXY_LOCAL: ${PCC_PROXY_LOCAL:-http://host.docker.internal:80}
    volumes:
      - ./client/config:/app/config:ro
      - ./client/logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
