services:
  gateway:
    image: ghcr.io/jcares/pcc-tunnel-gateway:latest
    ports:
      - "8082:8080"
      - "8081:8081"
    environment:
      PCC_CONTROL_ADDR: ":8080"
      PCC_PUBLIC_ADDR: ":8081"
      PCC_AUTH_TOKEN: "CHANGE_ME_TO_A_SECURE_TOKEN"
      PCC_LOG_FILE: "/app/logs/gateway.log"
    restart: always

  client:
    image: ghcr.io/jcares/pcc-tunnel-client:latest
    environment:
      PCC_GATEWAY_ADDR: "gateway:8080"
    restart: always
    depends_on:
      - gateway
