name: Publish Docker images

on:
  push:
    branches:
      - master
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  IMAGE_PREFIX: ghcr.io/jcares/pcc-tunnel

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and publish gateway
        uses: docker/build-push-action@v6
        with:
          context: ./gateway
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-gateway:latest
            ${{ env.IMAGE_PREFIX }}-gateway:${{ github.sha }}

      - name: Build and publish client
        uses: docker/build-push-action@v6
        with:
          context: ./client
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-client:latest
            ${{ env.IMAGE_PREFIX }}-client:${{ github.sha }}
